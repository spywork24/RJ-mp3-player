<!DOCTYPE html>
<html>
<head>
<title>RJ Online MP3 Player</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.player{
background:#1e293b;
padding:30px;
border-radius:15px;
text-align:center;
width:320px;
}

img{
width:220px;
border-radius:10px;
margin-bottom:15px;
}

button{
padding:10px 15px;
margin:5px;
border:none;
background:#22c55e;
color:white;
cursor:pointer;
font-size:18px;
border-radius:6px;
}

button:hover{
background:#16a34a;
}

#progress{
width:100%;
margin-top:15px;
}

</style>
</head>

<body>

<div class="player">

<h2>🎧 RJ Music Player</h2>

<img id="cover" src="cover/cover1.jpg">

<h3 id="title">Song 1</h3>

<audio id="audio"></audio>

<div>

<button onclick="prevSong()">⏮</button>
<button onclick="playSong()">▶</button>
<button onclick="pauseSong()">⏸</button>
<button onclick="nextSong()">⏭</button>

</div>

<input type="range" id="progress" value="0">

</div>

<script>

let songs=[

{
name:"Song 1",
path:"music/song1.mp3",
cover:"cover/cover1.jpg"
},

{
name:"Song 2",
path:"music/song2.mp3",
cover:"cover/cover2.jpg"
},

{
name:"Song 3",
path:"music/song3.mp3",
cover:"cover/cover3.jpg"
}

]

let audio=document.getElementById("audio")
let title=document.getElementById("title")
let cover=document.getElementById("cover")
let progress=document.getElementById("progress")

let songIndex=0

function loadSong(){

audio.src=songs[songIndex].path
title.innerText=songs[songIndex].name
cover.src=songs[songIndex].cover

}

loadSong()

function playSong(){
audio.play()
}

function pauseSong(){
audio.pause()
}

function nextSong(){

songIndex++

if(songIndex>=songs.length){
songIndex=0
}

loadSong()
playSong()

}

function prevSong(){

songIndex--

if(songIndex<0){
songIndex=songs.length-1
}

loadSong()
playSong()

}

audio.addEventListener("timeupdate",()=>{

progress.value=(audio.currentTime/audio.duration)*100

})

progress.addEventListener("input",()=>{

audio.currentTime=(progress.value/100)*audio.duration

})

</script>

</body>
</html>
